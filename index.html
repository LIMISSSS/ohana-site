<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欧哈纳 · Ohana</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700;900&family=Cinzel:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --deep-blue: #0a0e27;
    --mid-blue: #141b3d;
    --purple: #6b4fa0;
    --pink: #e8927c;
    --gold: #f0c27f;
    --glow-pink: #ff7eb3;
    --glow-purple: #a855f7;
  }

  html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--purple) var(--deep-blue); }
  body { background: var(--deep-blue); color: #e0d8f0; font-family: 'Noto Serif SC', serif; overflow-x: hidden; min-height: 100vh; }

  #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

  #loader { position: fixed; inset: 0; background: var(--deep-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 1s ease, visibility 1s ease; }
  #loader.hidden { opacity: 0; visibility: hidden; }
  #loader .orb { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,126,179,0.8), rgba(168,85,247,0.4), transparent); animation: orbFloat 2s ease-in-out infinite; box-shadow: 0 0 60px 20px rgba(168,85,247,0.3), 0 0 120px 40px rgba(255,126,179,0.15); }
  #loader p { margin-top: 30px; font-size: 14px; letter-spacing: 6px; color: rgba(200,180,255,0.6); animation: textPulse 2s ease-in-out infinite; }
  @keyframes orbFloat { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.1); } }
  @keyframes textPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  .page-wrapper { position: relative; z-index: 1; }
  .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 40px 20px; }
  .hero::before, .hero::after { content: ''; position: fixed; top: 0; bottom: 0; width: 80px; z-index: 2; pointer-events: none; }
  .hero::before { left: 0; background: linear-gradient(90deg, rgba(10,14,39,0.9) 0%, rgba(10,14,39,0.4) 60%, transparent 100%); }
  .hero::after { right: 0; background: linear-gradient(-90deg, rgba(10,14,39,0.9) 0%, rgba(10,14,39,0.4) 60%, transparent 100%); }

  .title-section { text-align: center; margin-bottom: 40px; position: relative; }
  .title-cn { font-family: 'Noto Serif SC', serif; font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; background: linear-gradient(135deg, #f0c27f 0%, #ff7eb3 40%, #a855f7 70%, #6b4fa0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 12px; position: relative; animation: titleGlow 4s ease-in-out infinite; text-shadow: none; filter: drop-shadow(0 0 30px rgba(168,85,247,0.3)); }
  .title-en { font-family: 'Cinzel', serif; font-size: clamp(0.9rem, 2.5vw, 1.4rem); letter-spacing: 12px; color: rgba(200,180,255,0.4); margin-top: 8px; text-transform: uppercase; }
  .title-line { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--glow-purple), var(--glow-pink), var(--glow-purple), transparent); margin: 20px auto 0; animation: lineExpand 3s ease-in-out infinite; }
  @keyframes titleGlow { 0%, 100% { filter: drop-shadow(0 0 30px rgba(168,85,247,0.3)); } 50% { filter: drop-shadow(0 0 50px rgba(255,126,179,0.5)); } }
  @keyframes lineExpand { 0%, 100% { width: 120px; opacity: 0.6; } 50% { width: 200px; opacity: 1; } }

  .subtitle { text-align: center; margin-bottom: 50px; font-size: clamp(0.85rem, 2vw, 1.1rem); color: rgba(200,180,255,0.5); letter-spacing: 4px; line-height: 2; }
  .subtitle span { display: inline-block; animation: subtitleFloat 6s ease-in-out infinite; }
  .subtitle span:nth-child(2) { animation-delay: 0.5s; } .subtitle span:nth-child(3) { animation-delay: 1s; }
  @keyframes subtitleFloat { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-4px); opacity: 0.8; } }

  .video-container { position: relative; width: min(90vw, 900px); aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; margin-bottom: 50px; box-shadow: 0 0 0 1px rgba(168,85,247,0.2), 0 0 40px rgba(168,85,247,0.15), 0 0 80px rgba(255,126,179,0.1), 0 20px 60px rgba(0,0,0,0.5); }
  .video-container::before { content: ''; position: absolute; inset: -2px; border-radius: 18px; background: linear-gradient(135deg, var(--glow-purple), var(--glow-pink), var(--gold), var(--glow-purple)); background-size: 300% 300%; animation: borderGlow 6s ease infinite; z-index: -1; opacity: 0.5; }
  .video-container::after { content: ''; position: absolute; inset: 0; border-radius: 16px; background: linear-gradient(180deg, transparent 60%, rgba(10,14,39,0.6) 100%); pointer-events: none; z-index: 2; }
  @keyframes borderGlow { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  .video-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #0d1137, #1a1050, #0d1137); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 16px; position: relative; overflow: hidden; cursor: pointer; transition: transform 0.3s ease; }
  .video-placeholder:hover { transform: scale(1.01); }
  .vp-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 80%, rgba(255,126,179,0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.15) 0%, transparent 50%), radial-gradient(ellipse at 50% 50%, rgba(107,79,160,0.1) 0%, transparent 70%); animation: vpBgShift 8s ease-in-out infinite; }
  @keyframes vpBgShift { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }

  .vp-jellyfish { position: absolute; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(255,126,179,0.6), rgba(168,85,247,0.3), transparent); animation: jellyfishFloat var(--dur) ease-in-out infinite; opacity: 0.5; }
  .vp-jellyfish::after { content: ''; position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); width: 2px; height: 30px; background: linear-gradient(to bottom, rgba(255,126,179,0.4), transparent); }
  .vp-j1 { width: 40px; height: 28px; top: 15%; left: 20%; --dur: 7s; animation-delay: 0s; }
  .vp-j2 { width: 55px; height: 38px; top: 10%; left: 55%; --dur: 9s; animation-delay: 1s; }
  .vp-j3 { width: 30px; height: 20px; top: 25%; left: 75%; --dur: 6s; animation-delay: 2s; }
  .vp-j4 { width: 35px; height: 24px; top: 8%; left: 35%; --dur: 8s; animation-delay: 3s; }
  .vp-j5 { width: 25px; height: 18px; top: 20%; left: 85%; --dur: 5s; animation-delay: 1.5s; }
  @keyframes jellyfishFloat { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 25% { transform: translate(10px, -15px) rotate(5deg); } 50% { transform: translate(-5px, -25px) rotate(-3deg); } 75% { transform: translate(15px, -10px) rotate(7deg); } }

  .vp-fox { position: absolute; width: 6px; height: 6px; background: radial-gradient(circle, rgba(240,194,127,0.9), transparent); border-radius: 50%; animation: foxDance var(--dur) ease-in-out infinite; box-shadow: 0 0 10px rgba(240,194,127,0.5); }
  .vp-fox::before { content: ''; position: absolute; top: -4px; left: -2px; width: 10px; height: 5px; border-top-left-radius: 50%; border-top-right-radius: 50%; background: rgba(240,194,127,0.3); }
  .vp-f1 { top: 30%; left: 15%; --dur: 4s; animation-delay: 0s; }
  .vp-f2 { top: 35%; left: 25%; --dur: 3.5s; animation-delay: 0.5s; }
  .vp-f3 { top: 28%; left: 80%; --dur: 4.5s; animation-delay: 1s; }
  .vp-f4 { top: 40%; left: 70%; --dur: 3s; animation-delay: 1.5s; }
  .vp-f5 { top: 25%; left: 50%; --dur: 5s; animation-delay: 0.8s; }
  @keyframes foxDance { 0%, 100% { transform: translate(0, 0); opacity: 0.3; } 50% { transform: translate(var(--tx, 20px), var(--ty, -15px)); opacity: 0.8; } }

  .vp-couple { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; align-items: flex-end; }
  .vp-person { width: 18px; background: linear-gradient(to top, rgba(10,14,39,0.9), rgba(107,79,160,0.3)); border-radius: 8px 8px 0 0; position: relative; }
  .vp-person::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: radial-gradient(circle, rgba(200,180,255,0.4), transparent); border-radius: 50%; }
  .vp-p1 { height: 35px; } .vp-p2 { height: 32px; }

  .play-btn { position: relative; z-index: 5; width: 80px; height: 80px; border-radius: 50%; background: rgba(168,85,247,0.15); border: 2px solid rgba(255,126,179,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.4s ease; backdrop-filter: blur(10px); animation: playPulse 3s ease-in-out infinite; }
  .play-btn:hover { background: rgba(168,85,247,0.3); border-color: rgba(255,126,179,0.6); transform: scale(1.1); }
  .play-btn svg { width: 30px; height: 30px; fill: rgba(255,200,220,0.8); margin-left: 4px; }
  @keyframes playPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(168,85,247,0.2), 0 0 30px rgba(168,85,247,0.1); } 50% { box-shadow: 0 0 0 15px rgba(168,85,247,0), 0 0 50px rgba(255,126,179,0.15); } }
  .play-text { position: relative; z-index: 5; margin-top: 20px; font-size: 0.8rem; letter-spacing: 4px; color: rgba(200,180,255,0.4); }

  .description { max-width: 700px; margin: 0 auto 80px; padding: 0 30px; text-align: center; }
  .desc-line { font-size: clamp(0.9rem, 2vw, 1.05rem); line-height: 2.2; color: rgba(200,180,255,0.55); letter-spacing: 2px; margin-bottom: 24px; }
  .desc-highlight { color: var(--glow-pink); font-weight: 500; }
  .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--glow-purple), transparent); margin: 40px auto; }

  .page-jellyfish { position: fixed; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(255,126,179,0.4), rgba(168,85,247,0.2), transparent); pointer-events: none; z-index: 0; animation: pageJelly var(--dur) ease-in-out infinite; opacity: 0.15; }
  .page-jelly::after { content: ''; position: absolute; bottom: -40%; left: 50%; transform: translateX(-50%); width: 1px; height: 40%; background: linear-gradient(to bottom, rgba(255,126,179,0.2), transparent); }
  .pj1 { width: 80px; height: 55px; top: 10%; right: 5%; --dur: 12s; animation-delay: 0s; } .pj2 { width: 50px; height: 35px; top: 30%; left: 3%; --dur: 10s; animation-delay: 2s; } .pj3 { width: 65px; height: 45px; bottom: 20%; right: 10%; --dur: 14s; animation-delay: 4s; } .pj4 { width: 40px; height: 28px; top: 50%; left: 8%; --dur: 9s; animation-delay: 1s; }
  @keyframes pageJelly { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 33% { transform: translate(20px, -30px) rotate(5deg); } 66% { transform: translate(-15px, -20px) rotate(-5deg); } }

  .footer { text-align: center; padding: 40px 20px 60px; position: relative; }
  .footer-logo { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 6px; color: rgba(200,180,255,0.25); margin-bottom: 12px; }
  .footer-text { font-size: 0.7rem; color: rgba(200,180,255,0.15); letter-spacing: 3px; }

  .qr-section { text-align: center; padding: 60px 20px 40px; position: relative; }
  .qr-label { font-size: 0.85rem; letter-spacing: 4px; color: rgba(200,180,255,0.4); margin-bottom: 24px; }
  .qr-wrapper { display: inline-block; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid rgba(168,85,247,0.15); backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(168,85,247,0.08); position: relative; }
  .qr-wrapper::before { content: ''; position: absolute; inset: -1px; border-radius: 16px; background: linear-gradient(135deg, rgba(168,85,247,0.3), transparent, rgba(255,126,179,0.3)); z-index: -1; }
  .qr-wrapper canvas { border-radius: 8px; }
  .qr-hint { margin-top: 16px; font-size: 0.7rem; color: rgba(200,180,255,0.25); letter-spacing: 2px; }

  .scroll-indicator { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; animation: scrollBounce 2s ease-in-out infinite; }
  .scroll-indicator span { font-size: 0.65rem; letter-spacing: 3px; color: rgba(200,180,255,0.25); }
  .scroll-arrow { width: 20px; height: 20px; border-right: 1px solid rgba(200,180,255,0.25); border-bottom: 1px solid rgba(200,180,255,0.25); transform: rotate(45deg); }
  @keyframes scrollBounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(8px); } }

  @media (max-width: 768px) { .hero::before, .hero::after { width: 40px; } .video-container { width: 95vw; border-radius: 12px; } .video-container::before { border-radius: 14px; } .title-cn { letter-spacing: 6px; } .play-btn { width: 60px; height: 60px; } .play-btn svg { width: 22px; height: 22px; } }

  .ambient-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); }
  .ao1 { width: 300px; height: 300px; background: rgba(168,85,247,0.08); top: 20%; left: -100px; animation: orbDrift 20s ease-in-out infinite; }
  .ao2 { width: 250px; height: 250px; background: rgba(255,126,179,0.06); bottom: 10%; right: -80px; animation: orbDrift 18s ease-in-out infinite reverse; }
  .ao3 { width: 200px; height: 200px; background: rgba(107,79,160,0.06); top: 50%; left: 50%; animation: orbDrift 25s ease-in-out infinite; }
  @keyframes orbDrift { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(50px, -30px); } 50% { transform: translate(-20px, 40px); } 75% { transform: translate(30px, 20px); } }

  .tree-glow { position: fixed; bottom: 0; width: 4px; height: 200px; z-index: 0; pointer-events: none; opacity: 0.15; }
  .tg-left { left: 20px; background: linear-gradient(to top, rgba(255,126,179,0.4), transparent); border-radius: 2px; animation: treePulse 4s ease-in-out infinite; }
  .tg-right { right: 20px; background: linear-gradient(to top, rgba(168,85,247,0.4), transparent); border-radius: 2px; animation: treePulse 4s ease-in-out infinite 2s; }
  @keyframes treePulse { 0%, 100% { opacity: 0.1; height: 200px; } 50% { opacity: 0.25; height: 250px; } }

  .cursor-glow { position: fixed; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(168,85,247,0.06), transparent 70%); pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: opacity 0.3s; }

  .audio-toggle { position: fixed; top: 20px; right: 20px; z-index: 100; width: 44px; height: 44px; border-radius: 50%; background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px); }
  .audio-toggle:hover { background: rgba(168,85,247,0.2); border-color: rgba(255,126,179,0.3); }
  .audio-toggle svg { width: 18px; height: 18px; fill: rgba(200,180,255,0.5); }
</style>
</head>
<body>

<div id="loader"><div class="orb"></div><p>欧 哈 纳</p></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="ambient-orb ao1"></div><div class="ambient-orb ao2"></div><div class="ambient-orb ao3"></div>
<div class="tree-glow tg-left"></div><div class="tree-glow tg-right"></div>
<canvas id="starfield"></canvas>
<div class="page-jellyfish pj1"></div><div class="page-jellyfish pj2"></div><div class="page-jellyfish pj3"></div><div class="page-jellyfish pj4"></div>
<div class="audio-toggle" id="audioToggle" title="背景音乐"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></div>

<div class="page-wrapper">
  <section class="hero" id="hero">
    <div class="title-section">
      <h1 class="title-cn">欧哈纳</h1>
      <p class="title-en">Ohana · 家人</p>
      <div class="title-line"></div>
    </div>
    <div class="subtitle">
      <span>在星空与梦境的交界处</span><br>
      <span>水母轻舞 · 灵狐相伴</span><br>
      <span>与你共赴一场永恒的约定</span>
    </div>

    <!-- ✅ 修复后的视频容器：结构干净、ID唯一、无冗余注释 -->
    <div class="video-container" id="videoContainer">
      <div class="video-placeholder" id="videoPlaceholder">
        <div class="vp-bg"></div>
        <div class="vp-jellyfish vp-j1"></div><div class="vp-jellyfish vp-j2"></div><div class="vp-jellyfish vp-j3"></div><div class="vp-jellyfish vp-j4"></div><div class="vp-jellyfish vp-j5"></div>
        <div class="vp-fox vp-f1" style="--tx:15px;--ty:-20px"></div><div class="vp-fox vp-f2" style="--tx:-10px;--ty:-25px"></div><div class="vp-fox vp-f3" style="--tx:20px;--ty:-10px"></div><div class="vp-fox vp-f4" style="--tx:-15px;--ty:-30px"></div><div class="vp-fox vp-f5" style="--tx:10px;--ty:-20px"></div>
        <div class="vp-couple"><div class="vp-person vp-p1"></div><div class="vp-person vp-p2"></div></div>
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24"><polygon points="8,5 20,12 8,19"/></svg></div>
        <p class="play-text">点 击 播 放</p>
      </div>
    </div>

    <div class="description">
      <p class="desc-line">夜幕低垂，星河如瀑。<br>幽蓝的森林中，<span class="desc-highlight">发光的水母</span>在夜空悠然漂游，<br>如梦境般绚烂的触须，轻轻拂过天际。</p>
      <div class="divider"></div>
      <p class="desc-line">灵狐穿梭于发光的古树之间，<br>每一棵树上都镌刻着<span class="desc-highlight">远古的符文</span>。<br>河水倒映着漫天星辉，泛着温柔的粉紫微光。</p>
      <div class="divider"></div>
      <p class="desc-line">一对身影静静坐在河畔，<br>仰望着这片不属于尘世的风景。<br><span class="desc-highlight">「欧哈纳」</span>——家人，<br>意味着没有人会被遗忘，也没有人会被抛下。</p>
    </div>
    <div class="scroll-indicator"><span>向下滑动</span><div class="scroll-arrow"></div></div>
  </section>

  <section class="qr-section" id="qrSection">
    <p class="qr-label">扫 码 分 享</p>
    <div class="qr-wrapper"><canvas id="qrCanvas" width="200" height="200"></canvas></div>
    <p class="qr-hint">扫描上方二维码 · 进入欧哈纳的世界</p>
  </section>

  <footer class="footer"><div class="footer-logo">O H A N A</div><p class="footer-text">没有人会被遗忘 · 也没有人会被抛下</p></footer>
</div>

<script>
// ====== MINIMAL QR CODE GENERATOR ======
const QRCode = (() => {
  const _QRMath = (() => {
    const EXP_TABLE = new Array(256), LOG_TABLE = new Array(256);
    for (let i = 0; i < 8; i++) EXP_TABLE[i] = 1 << i;
    for (let i = 8; i < 256; i++) EXP_TABLE[i] = EXP_TABLE[i - 4] ^ EXP_TABLE[i - 5] ^ EXP_TABLE[i - 6] ^ EXP_TABLE[i - 8];
    for (let i = 0; i < 255; i++) LOG_TABLE[EXP_TABLE[i]] = i;
    return {
      glog: n => { if (n < 1) throw new Error('glog(' + n + ')'); return LOG_TABLE[n]; },
      gexp: n => { while (n < 0) n += 255; while (n >= 256) n -= 255; return EXP_TABLE[n]; }
    };
  })();
  class QR8bitByte { constructor(d) { this.mode = 4; this.data = d; } getLength() { return this.data.length; } write(b) { for (let i = 0; i < this.data.length; i++) b.put(this.data.charCodeAt(i), 8); } }
  class QRCodeModel {
    constructor(t, e) { this.typeNumber = t; this.errorCorrectLevel = e; this.modules = null; this.moduleCount = 0; this.dataCache = null; this.dataList = []; }
    addData(d) { this.dataList.push(new QR8bitByte(d)); this.dataCache = null; }
    isDark(r, c) { if (r < 0 || this.moduleCount <= r || c < 0 || this.moduleCount <= c) throw new Error(r + ',' + c); return this.modules[r][c]; }
    getModuleCount() { return this.moduleCount; }
    make() { this.makeImpl(false, this.getBestMaskPattern()); }
    makeImpl(test, mask) {
      this.moduleCount = this.typeNumber * 4 + 17; this.modules = [];
      for (let r = 0; r < this.moduleCount; r++) { this.modules[r] = []; for (let c = 0; c < this.moduleCount; c++) this.modules[r][c] = null; }
      this.setupPositionProbePattern(0, 0); this.setupPositionProbePattern(this.moduleCount - 7, 0); this.setupPositionProbePattern(0, this.moduleCount - 7);
      this.setupPositionAdjustPattern(); this.setupTimingPattern(); this.setupTypeInfo(test, mask);
      if (this.typeNumber >= 7) this.setupTypeNumber(test);
      if (this.dataCache == null) this.dataCache = QRCodeModel.createData(this.typeNumber, this.errorCorrectLevel, this.dataList);
      this.mapData(this.dataCache, mask);

window.addEventListener('resize', resizeStarfield); resizeStarfield(); drawStars();

// ====== UI INTERACTIONS ======
const cursorGlow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', e => { cursorGlow.style.left = e.clientX + 'px'; cursorGlow.style.top = e.clientY + 'px'; });
window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1500));

const qrCanvas = document.getElementById('qrCanvas');
try { QRCode.generate(window.location.href || 'https://ohana-fantasy.example.com', qrCanvas, { cellSize: 6, margin: 4, darkColor: '#a855f7', lightColor: 'rgba(10,14,39,0.9)' }); } catch(e) { console.log('QR note:', e.message); }

const audioToggle = document.getElementById('audioToggle'); let audioPlaying = false;
audioToggle.addEventListener('click', () => { audioPlaying = !audioPlaying; audioToggle.style.background = audioPlaying ? 'rgba(168,85,247,0.3)' : 'rgba(168,85,247,0.1)'; audioToggle.style.borderColor = audioPlaying ? 'rgba(255,126,179,0.5)' : 'rgba(168,85,247,0.2)'; });

// ====== ✅ 视频播放逻辑 (已彻底修复 null 与 404) ======
document.addEventListener('DOMContentLoaded', () => {
  const playBtn = document.getElementById('playBtn');
  const placeholder = document.getElementById('videoPlaceholder');
  const container = document.getElementById('videoContainer') || document.querySelector('.video-container');
  if (!playBtn || !placeholder || !container) { console.warn('⚠️ 视频组件未就绪'); return; }

  playBtn.addEventListener('click', () => {
    placeholder.style.transition = 'opacity 0.5s'; placeholder.style.opacity = '0';
    setTimeout(() => {
      placeholder.style.display = 'none';
      const vid = document.createElement('video');
      vid.src = './video1.mp4'; // ⚠️ 必须与 index.html 同级
      vid.controls = true; vid.loop = true; vid.autoplay = true; vid.muted = true; vid.playsInline = true; vid.preload = 'auto';
      vid.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:16px;';
      container.appendChild(vid);
      vid.play().catch(() => console.warn('自动播放被浏览器拦截，已保持静音'));
    }, 500);
  });
});

// ====== SCROLL EFFECTS ======
const observer = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'translateY(0)'; } }), { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
document.querySelectorAll('.description, .qr-section, .divider').forEach(el => { el.style.opacity = '0'; el.style.transform = 'translateY(30px)'; el.style.transition = 'opacity 0.8s ease, transform 0.8s ease'; observer.observe(el); });

window.addEventListener('scroll', () => {
  const h = document.getElementById('hero');
  if (h) { h.style.transform = `translateY(${window.scrollY * 0.15}px)`; h.style.opacity = Math.max(0, 1 - window.scrollY / (window.innerHeight * 1.5)); }
});
